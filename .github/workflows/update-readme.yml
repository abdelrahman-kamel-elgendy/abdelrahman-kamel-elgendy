name: Update README Daily

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate stats.svg
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: assets/stats.svg
          user: abdelrahman-kamel-elgendy
          template: classic
          base: header, activity, community, repositories
          config_display: large
          config_animations: yes
          config_timezone: Africa/Cairo
          config_output: svg
 
      - name: Generate streak.svg
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: assets/streak.svg
          user: abdelrahman-kamel-elgendy
          template: classic
          base: ""
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          config_timezone: Africa/Cairo
          config_output: svg
 
      - name: Generate langs.svg
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: assets/langs.svg
          user: abdelrahman-kamel-elgendy
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_indepth: no
          config_timezone: Africa/Cairo
          config_output: svg

      - name: Update tip and quote in README
        run: |
          python3 << 'PYTHON'
          import json
          import urllib.request
          import datetime
          import re

          # --- Get current datetime ---
          now = datetime.datetime.now(datetime.timezone(datetime.timedelta(hours=2)))
          ts  = now.strftime("%Y-%m-%d %H:%M:%S.") + f"{now.microsecond // 1000:03d} +02:00"

          # --- Pick daily tip ---
          with open('tips.json') as f:
              tips = json.load(f)
          day = now.timetuple().tm_yday - 1
          tip = tips[day % len(tips)]

          # --- Fetch quote from API ---
          try:
              url = "https://zenquotes.io/api/today"
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              with urllib.request.urlopen(req, timeout=10) as r:
                  data = json.loads(r.read())
              quote  = data[0]["q"]
              author = data[0]["a"]
          except Exception:
              quote  = "First, solve the problem. Then, write the code."
              author = "John Johnson"

          SEP = "\u2500" * 65

          def log(level, service, msg):
              return f"[{ts} {level}] {service} {msg}"

          # --- Build tip log block ---
          tip_lines = [
              "<!-- TIP_START -->",
              "```log",
              log("INF", "tip-service", "Fetching tip of the day..."),
              log("INF", "tip-service", "Source: tips.json  offset: day_of_year % 365"),
              log("INF", "tip-service", "Status: OK  \u2192  tip loaded"),
              SEP,
              log("TIP", "tip-service", tip),
              SEP,
              "```",
              "<!-- TIP_END -->",
          ]
          tip_block = "\n".join(tip_lines)

          # --- Build quote log block ---
          quote_lines = [
              "<!-- QUOTE_START -->",
              "```log",
              log("INF", "quote-service", "Connecting to quotes upstream..."),
              log("INF", "quote-service", "GET https://zenquotes.io/api/today  \u2192  200 OK"),
              log("INF", "quote-service", "Message received  \u2192  quote loaded"),
              SEP,
              log("QOT", "quote-service", quote),
              log("AUT", "quote-service", author),
              SEP,
              "```",
              "<!-- QUOTE_END -->",
          ]
          quote_block = "\n".join(quote_lines)

          # --- Inject into README ---
          with open('README.md', 'r') as f:
              content = f.read()

          content = re.sub(
              r'<!-- TIP_START -->.*?<!-- TIP_END -->',
              tip_block,
              content, flags=re.DOTALL
          )

          content = re.sub(
              r'<!-- QUOTE_START -->.*?<!-- QUOTE_END -->',
              quote_block,
              content, flags=re.DOTALL
          )

          with open('README.md', 'w') as f:
              f.write(content)

          print("Tip: " + tip)
          print("Quote: " + quote + " - " + author)
          PYTHON

      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          if git diff --cached --quiet; then
            git commit --allow-empty -m "Update daily tip and quote $(date +'%Y-%m-%d')"
          else
            git commit -m "Update daily tip and quote $(date +'%Y-%m-%d')"
          fi
          git push