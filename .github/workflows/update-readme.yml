name: Update README Daily

on:
  schedule:
    - cron: "0 1 * * *"   # 03:00 Cairo time (UTC+2)
  workflow_dispatch:        # allow manual trigger from Actions tab

permissions:
  contents: write

# ─────────────────────────────────────────────────────────────────────────────
#  JOB 1 — Generate metric SVGs into assets/
#  Uses lowlighter/metrics to produce stats.svg, streak.svg, langs.svg
#  Each step commits its SVG directly to the repo via the action itself.
# ─────────────────────────────────────────────────────────────────────────────
jobs:

  metrics:
    name: Generate Metric SVGs
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      # ── Stats card (commits, PRs, issues, repos, rank) ──────────────────
      - name: Generate stats.svg
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/stats.svg
          user: abdelrahman-kamel-elgendy
          template: classic
          base: header, activity, community, repositories
          config_display: large
          config_animations: yes
          config_timezone: Africa/Cairo
          config_output: svg
          # styling — matches your purple theme
          config_padding: 10
          extras_css: |
            :root {
              --color-text: #CDD6F4;
              --color-link: #A78BFA;
            }
            h2 { color: #A78BFA !important; }
            .field svg { fill: #A78BFA !important; }
            body { background: #0D1117 !important; }

      # ── Habits / streak card ─────────────────────────────────────────────
      - name: Generate streak.svg
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/streak.svg
          user: abdelrahman-kamel-elgendy
          template: classic
          base: ""
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: chartist
          config_timezone: Africa/Cairo
          config_output: svg
          extras_css: |
            :root {
              --color-text: #CDD6F4;
              --color-link: #A78BFA;
            }
            h2 { color: #A78BFA !important; }
            body { background: #0D1117 !important; }

      # ── Top languages card ───────────────────────────────────────────────
      - name: Generate langs.svg
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/langs.svg
          user: abdelrahman-kamel-elgendy
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_indepth: no
          config_timezone: Africa/Cairo
          config_output: svg
          extras_css: |
            :root {
              --color-text: #CDD6F4;
              --color-link: #A78BFA;
            }
            h2 { color: #A78BFA !important; }
            body { background: #0D1117 !important; }

  # ─────────────────────────────────────────────────────────────────────────
  #  JOB 2 — Update tip + quote in README.md
  #  Runs after metrics job so both changes land in one place.
  # ─────────────────────────────────────────────────────────────────────────
  update-readme:
    name: Update Tip & Quote
    runs-on: ubuntu-latest
    needs: metrics        # wait for SVGs to be committed first

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main        # pull the latest commit (which includes the new SVGs)

      - name: Update tip and quote in README
        run: |
          python3 << 'PYTHON'
          import json
          import urllib.request
          import datetime
          import re

          # ── Current Cairo timestamp ────────────────────────────────────────
          now = datetime.datetime.now(datetime.timezone(datetime.timedelta(hours=2)))
          ts  = now.strftime("%Y-%m-%d %H:%M:%S.") + f"{now.microsecond // 1000:03d} +02:00"

          # ── Pick daily tip (cycles through all 365 tips) ───────────────────
          with open('tips.json') as f:
              tips = json.load(f)
          day = now.timetuple().tm_yday - 1
          tip = tips[day % len(tips)]

          # ── Fetch quote from zenquotes.io ──────────────────────────────────
          try:
              req = urllib.request.Request(
                  "https://zenquotes.io/api/today",
                  headers={"User-Agent": "Mozilla/5.0"}
              )
              with urllib.request.urlopen(req, timeout=10) as r:
                  data = json.loads(r.read())
              quote  = data[0]["q"]
              author = data[0]["a"]
          except Exception as e:
              print(f"Quote fetch failed: {e} — using fallback")
              quote  = "First, solve the problem. Then, write the code."
              author = "John Johnson"

          SEP = "\u2500" * 65

          def log(level, service, msg):
              return f"[{ts} {level}] {service} {msg}"

          # ── Build tip block ────────────────────────────────────────────────
          tip_block = "\n".join([
              "<!-- TIP_START -->",
              "```log",
              log("INF", "tip-service", "Fetching tip of the day..."),
              log("INF", "tip-service", f"Source: tips.json  offset: day_of_year % {len(tips)}"),
              log("INF", "tip-service", "Status: OK  \u2192  tip loaded"),
              SEP,
              log("TIP", "tip-service", tip),
              SEP,
              "```",
              "<!-- TIP_END -->",
          ])

          # ── Build quote block ──────────────────────────────────────────────
          quote_block = "\n".join([
              "<!-- QUOTE_START -->",
              "```log",
              log("INF", "quote-service", "Connecting to quotes upstream..."),
              log("INF", "quote-service", "GET https://zenquotes.io/api/today  \u2192  200 OK"),
              log("INF", "quote-service", "Message received  \u2192  quote loaded"),
              SEP,
              log("QOT", "quote-service", quote),
              log("AUT", "quote-service", author),
              SEP,
              "```",
              "<!-- QUOTE_END -->",
          ])

          # ── Inject into README ─────────────────────────────────────────────
          with open('README.md', 'r') as f:
              content = f.read()

          content = re.sub(
              r'<!-- TIP_START -->.*?<!-- TIP_END -->',
              tip_block,
              content, flags=re.DOTALL
          )
          content = re.sub(
              r'<!-- QUOTE_START -->.*?<!-- QUOTE_END -->',
              quote_block,
              content, flags=re.DOTALL
          )

          with open('README.md', 'w') as f:
              f.write(content)

          print(f"✅ Tip    : {tip}")
          print(f"✅ Quote  : {quote} — {author}")
          PYTHON

      - name: Commit and push
        run: |
          git config --global user.name  "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No README changes to commit"
          else
            git commit -m "chore: update daily tip and quote [$(date +'%Y-%m-%d')]"
            git push
          fi