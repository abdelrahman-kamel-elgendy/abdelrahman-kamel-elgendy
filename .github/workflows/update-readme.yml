name: Update README Daily
 
on:
  schedule:
    - cron: "0 1 * * *"   # 03:00 Cairo time (UTC+2)
  workflow_dispatch:
 
permissions:
  contents: write
 
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
 
      - name: Checkout repository
        uses: actions/checkout@v4
 
      # ── Step 1: Fetch real GitHub stats → inject into SQL result block ────
      - name: Fetch GitHub stats and update metrics block
        env:
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: |
          python3 << 'PYTHON'
          import urllib.request
          import json
          import re
          import os
          import datetime
 
          USERNAME = "abdelrahman-kamel-elgendy"
          TOKEN    = os.environ.get("METRICS_TOKEN", "")
 
          def graphql(query):
              payload = json.dumps({"query": query}).encode()
              req = urllib.request.Request(
                  "https://api.github.com/graphql",
                  data=payload,
                  headers={
                      "Authorization": f"Bearer {TOKEN}",
                      "User-Agent":    "readme-bot",
                      "Content-Type":  "application/json",
                  }
              )
              with urllib.request.urlopen(req, timeout=15) as r:
                  return json.loads(r.read())
 
          try:
              year = datetime.datetime.utcnow().year
 
              q = f"""
              {{
                user(login: "{USERNAME}") {{
                  contributionsCollection(
                    from: "{year}-01-01T00:00:00Z"
                    to:   "{year}-12-31T23:59:59Z"
                  ) {{
                    totalCommitContributions
                    totalPullRequestContributions
                    contributionCalendar {{
                      weeks {{
                        contributionDays {{
                          contributionCount
                          date
                        }}
                      }}
                    }}
                  }}
                  repositories(first: 100, ownerAffiliations: OWNER, isFork: false) {{
                    totalCount
                    nodes {{
                      languages(first: 5, orderBy: {{field: SIZE, direction: DESC}}) {{
                        edges {{
                          size
                          node {{ name }}
                        }}
                      }}
                    }}
                  }}
                }}
              }}
              """
 
              data    = graphql(q)["data"]["user"]
              cc      = data["contributionsCollection"]
              commits = cc["totalCommitContributions"]
              prs     = cc["totalPullRequestContributions"]
              repos   = data["repositories"]["totalCount"]
 
              # ── Streaks ──────────────────────────────────────────────────
              days = sorted(
                  [d for week in cc["contributionCalendar"]["weeks"]
                     for d    in week["contributionDays"]],
                  key=lambda d: d["date"]
              )
              today_str = datetime.datetime.utcnow().strftime("%Y-%m-%d")
 
              current_streak = 0
              for d in reversed(days):
                  if d["date"] > today_str:
                      continue
                  if d["contributionCount"] > 0:
                      current_streak += 1
                  else:
                      break
 
              longest_streak = cur = 0
              for d in days:
                  cur = (cur + 1) if d["contributionCount"] > 0 else 0
                  longest_streak = max(longest_streak, cur)
 
              # ── Top languages ─────────────────────────────────────────────
              lang_sizes = {}
              for repo in data["repositories"]["nodes"]:
                  for edge in repo["languages"]["edges"]:
                      name = edge["node"]["name"]
                      lang_sizes[name] = lang_sizes.get(name, 0) + edge["size"]
              top_langs = ", ".join(
                  k for k, _ in sorted(lang_sizes.items(), key=lambda x: -x[1])[:5]
              ) or "N/A"
 
          except Exception as e:
              print(f"GitHub API error: {e} — skipping metrics update")
              exit(0)
 
          # ── Build new block ───────────────────────────────────────────────
          def row(label, val):
              return f"-- {label:<14}: {val}"
 
          new_block = "\n".join([
              "<!-- METRICS_START -->",
              row("total_commits",  commits),
              row("pull_requests",  prs),
              row("repositories",   repos),
              row("current_streak", f"{current_streak} days"),
              row("longest_streak", f"{longest_streak} days"),
              row("top_languages",  top_langs),
              "<!-- METRICS_END -->",
          ])
 
          with open("README.md") as f:
              content = f.read()
 
          content = re.sub(
              r"<!-- METRICS_START -->.*?<!-- METRICS_END -->",
              new_block,
              content,
              flags=re.DOTALL,
          )
 
          with open("README.md", "w") as f:
              f.write(content)
 
          print(f"commits={commits} prs={prs} repos={repos} "
                f"streak={current_streak} longest={longest_streak} langs={top_langs}")
          PYTHON
 
      # ── Step 2: Fetch quote + pick tip → inject into log blocks ──────────
      - name: Update tip and quote in README
        run: |
          python3 << 'PYTHON'
          import json
          import urllib.request
          import datetime
          import re
 
          now = datetime.datetime.now(datetime.timezone(datetime.timedelta(hours=2)))
          ts  = now.strftime("%Y-%m-%d %H:%M:%S.") + f"{now.microsecond // 1000:03d} +02:00"
 
          with open('tips.json') as f:
              tips = json.load(f)
          day = now.timetuple().tm_yday - 1
          tip = tips[day % len(tips)]
 
          try:
              req = urllib.request.Request(
                  "https://zenquotes.io/api/today",
                  headers={"User-Agent": "Mozilla/5.0"}
              )
              with urllib.request.urlopen(req, timeout=10) as r:
                  data = json.loads(r.read())
              quote  = data[0]["q"]
              author = data[0]["a"]
          except Exception:
              quote  = "First, solve the problem. Then, write the code."
              author = "John Johnson"
 
          SEP = "\u2500" * 65
 
          def log(level, service, msg):
              return f"[{ts} {level}] {service} {msg}"
 
          tip_block = "\n".join([
              "<!-- TIP_START -->",
              "```log",
              log("INF", "tip-service", "Fetching tip of the day..."),
              log("INF", "tip-service", f"Source: tips.json  offset: day_of_year % {len(tips)}"),
              log("INF", "tip-service", "Status: OK  \u2192  tip loaded"),
              SEP,
              log("TIP", "tip-service", tip),
              SEP,
              "```",
              "<!-- TIP_END -->",
          ])
 
          quote_block = "\n".join([
              "<!-- QUOTE_START -->",
              "```log",
              log("INF", "quote-service", "Connecting to quotes upstream..."),
              log("INF", "quote-service", "GET https://zenquotes.io/api/today  \u2192  200 OK"),
              log("INF", "quote-service", "Message received  \u2192  quote loaded"),
              SEP,
              log("QOT", "quote-service", quote),
              log("AUT", "quote-service", author),
              SEP,
              "```",
              "<!-- QUOTE_END -->",
          ])
 
          with open('README.md', 'r') as f:
              content = f.read()
 
          content = re.sub(r'<!-- TIP_START -->.*?<!-- TIP_END -->',
                           tip_block, content, flags=re.DOTALL)
          content = re.sub(r'<!-- QUOTE_START -->.*?<!-- QUOTE_END -->',
                           quote_block, content, flags=re.DOTALL)
 
          with open('README.md', 'w') as f:
              f.write(content)
 
          print(f"Tip: {tip}")
          print(f"Quote: {quote} - {author}")
          PYTHON

      - name: Commit and push
        run: |
          git config --global user.name "abdelrahman-kamel-elgendy"
          git config --global user.email "abdelrahman.kamel.elgendy@gmail.com"
          git add README.md
          if git diff --cached --quiet; then
            git commit --allow-empty -m "Update daily tip and quote $(date +'%Y-%m-%d')"
          else
            git commit -m "Update daily tip and quote $(date +'%Y-%m-%d')"
          fi
          git push